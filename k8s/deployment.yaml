apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-app
  labels:
    app: devsecops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devsecops-app
  template:
    metadata:
      labels:
        app: devsecops-app
    spec:
      containers:
      - name: app
        image: DOCKER_USERNAME_PLACEHOLDER/devsecops-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        # --- Azure Database Environment Variables ---
        - name: DB_HOST
          value: "DB_HOST_PLACEHOLDER"
        - name: DB_USER
          value: "DB_USER_PLACEHOLDER"
        - name: DB_PASSWORD
          value: "DB_PASSWORD_PLACEHOLDER"
        - name: DB_NAME
          value: "postgres"
        # --- AWS S3 Environment Variables ---
        - name: AWS_REGION
          value: "ap-south-1"  # Fixed from ap-northeast-1 to match your AWS S3 bucket region
        - name: AWS_S3_BUCKET
          value: "AWS_S3_BUCKET_PLACEHOLDER"
        - name: AWS_ACCESS_KEY_ID
          value: "AWS_ACCESS_KEY_ID_PLACEHOLDER"
        - name: AWS_SECRET_ACCESS_KEY
          value: "AWS_SECRET_ACCESS_KEY_PLACEHOLDER"
        # --- Health Checks ---
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: devsecops-service
spec:
  type: NodePort
  selector:
    app: devsecops-app
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080
